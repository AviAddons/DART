<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DART Browser</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DART">
  <meta name="mobile-web-app-capable" content="yes">
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&display=swap" rel="stylesheet">
  
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #050510; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #bgCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 10;
      width: 85%;
      max-width: 400px;
      text-align: center;
      padding: 40px 24px;
      background: rgba(8, 8, 20, 0.65); 
      border-radius: 24px;
      backdrop-filter: blur(16px); 
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 3.8rem;
      margin: 0 0 8px 0;
      text-transform: uppercase;
      letter-spacing: 6px; 
      font-weight: 800;
      background: linear-gradient(90deg, #00f2fe, #4facfe, #00f2fe);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: logoShine 4s linear infinite;
      text-shadow: 0 0 25px rgba(0, 242, 254, 0.25);
    }

    @keyframes logoShine {
      to { background-position: 200% center; }
    }

    p {
      color: #798ea9;
      margin-bottom: 35px;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
      line-height: 1.5;
    }

    input {
      width: 100%;
      padding: 16px 24px;
      font-size: 16px; 
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 50px;
      outline: none;
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.05);
      box-sizing: border-box;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    input:focus {
      background: rgba(255, 255, 255, 0.12);
      border-color: #00f2fe;
      box-shadow: 0 0 20px rgba(0, 242, 254, 0.35);
    }

    input::placeholder { color: #4a5d78; }
    .hint { margin-top: 25px; font-size: 0.78rem; color: #485970; }
  </style>
</head>
<body>

  <canvas id="bgCanvas"></canvas>

  <div class="container">
    <h1>DART</h1>
    <p>Straight-to-destination web navigation. Skips results pages instantly.</p>
    <div class="search-box">
      <input type="search" id="launcherInput" placeholder="Where to? (e.g., imdb matrix)" autocomplete="off" autofocus />
    </div>
    <div class="hint">Type search keywords and hit Enter.</div>
  </div>

  <script>
    // Canvas Animation System
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const particleCount = 30; // Optimized down slightly for flawless mobile performance
    const connectionDistance = 110;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
        this.radius = Math.random() * 2 + 1;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0, 242, 254, 0.5)';
        ctx.fill();
      }
    }

    for (let i = 0; i < particleCount; i++) particles.push(new Particle());

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          if (distance < connectionDistance) {
            const opacity = 1 - (distance / connectionDistance);
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(79, 172, 254, ${opacity * 0.25})`;
            ctx.lineWidth = 0.7;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(animate);
    }
    animate();

    // Search Redirect Engine
    const input = document.getElementById('launcherInput');
    input.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        let query = input.value.trim();
        if (!query) return;
        const isUrl = query.includes('.') && !query.includes(' ');
        if (isUrl) {
          if (!query.startsWith('http')) query = 'https://' + query;
          window.location.href = query;
        } else {
          window.location.href = `https://duckduckgo.com/?q=\\${encodeURIComponent(query)}`;
        }
      }
    });
  </script>
</body>
</html>
